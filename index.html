<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jotfor.ms/s/umd/latest/for-widgets-embed.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 5px; }
  input { width: 80%; padding: 8px; font-size: 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 12px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; }
  .error { color: red; margin-top: 5px; font-size: 13px; }
  .success { color: green; margin-top: 5px; font-size: 13px; }
  .checking { color: #666; margin-top: 5px; font-size: 13px; }
  a { color: #1a73e8; }
  .row { display: flex; gap: 5px; }
</style>
</head>
<body>
<div class="row">
  <input type="email" id="email" placeholder="Enter your registered email" />
  <button onclick="validate()">Verify</button>
</div>
<div id="message"></div>
<script>
var API_URL = "https://script.google.com/macros/s/AKfycbzE_VL2m7e9Aw-0wnSsX1cRlxq87fuo-TnSzNQdsGfiDWKnf1-CnpJhR7TD2HfpeBeD-w/exec";
var emailInput = document.getElementById("email");
var msg = document.getElementById("message");

JFCustomWidget.subscribe("ready", function() {
  JFCustomWidget.sendData({ valid: false, value: "" });
});

JFCustomWidget.subscribe("submit", function() {
  var email = emailInput.value.trim();
  if (email && msg.innerHTML.indexOf("verified") > -1) {
    JFCustomWidget.sendSubmit({ valid: true, value: email });
  } else {
    JFCustomWidget.sendSubmit({ valid: false, value: "" });
  }
});
  
emailInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); validate(); }
});

function validate() {
  var email = emailInput.value.trim();
  if (!email) {
    msg.innerHTML = '<span class="error">Please enter an email.</span>';
    JFCustomWidget.sendData({ valid: false, value: "" });
    return;
  }
  msg.innerHTML = '<span class="checking">Checking...</span>';

  var callbackName = "cb_" + Date.now();
  window[callbackName] = function(data) {
    if (data.found) {
      msg.innerHTML = '<span class="success">Email verified.</span>';
      JFCustomWidget.sendData({ valid: true, value: email });
    } else {
      msg.innerHTML = '<span class="error">This email is not registered. <a href="https://allorausa.com/pages/registration" target="_blank">Register here</a>.</span>';
      JFCustomWidget.sendData({ valid: false, value: "" });
    }
    document.body.removeChild(script);
    delete window[callbackName];
  };

  var script = document.createElement("script");
  script.src = API_URL + "?email=" + encodeURIComponent(email) + "&callback=" + callbackName;
  script.onerror = function() {
    msg.innerHTML = '<span class="error">Unable to verify. Please try again.</span>';
    JFCustomWidget.sendData({ valid: false, value: "" });
  };
  document.body.appendChild(script);
}
</script>
</body>
</html>
